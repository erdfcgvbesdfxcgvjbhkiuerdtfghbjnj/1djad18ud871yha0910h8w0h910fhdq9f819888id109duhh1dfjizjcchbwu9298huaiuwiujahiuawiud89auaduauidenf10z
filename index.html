<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>正在加载游戏中心...</title>
    <style>
        body { background-color: #0f172a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { text-align: center; cursor: pointer; padding: 20px; border: 1px solid #334155; border-radius: 12px; background: #1e293b; }
    </style>
</head>
<body>

    <div class="loader" onclick="launchBox()">
        <h2>点击此处进入游戏中心</h2>
        <p>(若浏览器未自动弹出，请点击上方文字并允许弹出窗口)</p>
    </div>

    <script>
        function launchBox() {
            // 获取当前网址的根路径，并拼接出真正的游戏盒子文件 box.html
            const currentUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
            const boxUrl = currentUrl + 'box.html';

            // 打开一个完全空白的 about:blank 页面
            const win = window.open('about:blank', '_blank');
            
            if (win) {
                // 瞬间将全屏无边框的 iframe 嵌入 about:blank，加载真正的游戏盒子
                win.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <meta charset="UTF-8">
                        <meta name="viewport" content="width=device-width, initial-scale=1.0">
                        <title>游戏盒子</title>
                        <link rel="icon" type="image/png" href="https://github.com">
                        <style>
                            html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#0f172a; }
                            iframe { width:100%; height:100%; border:none; display:block; }
                        </style>
                    </head>
                    <body>
                        <iframe src="${boxUrl}" allow="autoplay; gamepad; fullscreen; pointer-lock" allowfullscreen="true"></iframe>
                    </body>
                    </html>
                `);
                win.document.close();
                
                // 成功打开后，让原来的 GitHub 页面自动关闭（或跳转到空白）
                window.location.replace('about:blank');
            }
        }

        // 页面一加载就尝试自动执行
        window.onload = function() {
            launchBox();
        };
    </script>
</body>
</html>
